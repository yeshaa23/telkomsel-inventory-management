# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: CI and CD Laravel App to Azure - Inventory Management

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: inventory-management-production-deployment
  cancel-in-progress: false

jobs:
  ci:
    name: CI - Build, Test, and Coverage
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2 with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, pdo_sqlite, sqlite3, zip, gd, dom, fileinfo
          coverage: xdebug
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend assets
        run: |
          npm ci
          npm run build
          rm -rf node_modules

      - name: Prepare Laravel test environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p bootstrap/cache

      - name: Run automated tests with coverage
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          XDEBUG_MODE: coverage
        run: php artisan test --coverage --min=60 --coverage-html coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Prepare production artifact
        run: |
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear || true
          php artisan cache:clear || true
          rm -rf coverage
          rm -f .env

      - name: Upload artifact for CD job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  cd:
    name: CD - Deploy to Azure
    runs-on: ubuntu-latest
    needs: ci

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Download artifact from CI job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'inventory-management-ayesha'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5B5754F9315A4A01BD6A748B7EB75554 }}
          package: .

      - name: Post-deploy smoke test
        run: |
          sleep 20
          curl -f -L https://inventory-management-ayesha.azurewebsites.net/login
